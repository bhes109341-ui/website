<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深藍史詩：海洋的遺落記憶 | 藝術導覽</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00050a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/bhes109341-ui/website/main/1.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #00050a;
            --accent-gold: #c5a358;
            --text-silver: #d1d1d1;
            --overlay-black: rgba(0, 0, 0, 0.7);
            --film-edge: #050505;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-silver);
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            line-height: 1.8;
        }

        /* --- 視覺特效：電影膠卷質感 --- */
        .film-grain {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.06;
            pointer-events: none;
            z-index: 9999;
        }

        .letterbox {
            position: fixed;
            left: 0; width: 100%;
            height: 6vh;
            background: var(--film-edge);
            z-index: 1000;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .top-bar { top: 0; }
        .bottom-bar { bottom: 0; }

        h1, h2, h3 {
            font-family: 'Noto Serif TC', serif;
            letter-spacing: 0.15em;
            color: var(--accent-gold);
        }

        section {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12vh 10%;
        }

        .hero {
            height: 100vh;
            background: linear-gradient(var(--overlay-black), var(--overlay-black)), 
                        url('https://raw.githubusercontent.com/bhes109341-ui/website/main/1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            text-align: center;
            flex-direction: column;
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 15px rgba(197, 163, 88, 0.4));
        }

        .hero p {
            font-size: 1.2rem;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .content-section {
            display: flex;
            gap: 60px;
            align-items: center;
        }

        .content-section:nth-child(even) {
            flex-direction: row-reverse;
        }

        .text-box {
            flex: 1;
            z-index: 2;
        }

        .text-box h2 {
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .text-box h2::after {
            content: "";
            position: absolute;
            left: 0; bottom: -10px;
            width: 40px; height: 2px;
            background: var(--accent-gold);
        }

        .text-box p {
            font-size: 1.1rem;
            opacity: 0.8;
            text-align: justify;
        }

        .image-box {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .frame {
            background: #fff;
            padding: 15px 15px 50px 15px;
            box-shadow: 10px 30px 60px rgba(0,0,0,0.8);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            max-width: 450px;
        }

        .frame img {
            width: 100%;
            height: auto;
            filter: sepia(20%) contrast(1.1);
        }

        .content-section:nth-child(odd) .frame { transform: rotate(2deg); }
        .content-section:nth-child(even) .frame { transform: rotate(-2deg); }

        .btn-group {
            margin-top: 2rem;
            display: flex;
            gap: 15px;
        }

        .cta-button {
            padding: 12px 30px;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            transition: all 0.4s;
            display: inline-block;
        }

        .cta-button:hover {
            background: var(--accent-gold);
            color: #000;
            box-shadow: 0 0 20px rgba(197, 163, 88, 0.4);
        }

        .reveal {
            opacity: 0;
            transform: translateY(60px);
            transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .delay-1 { transition-delay: 0.3s; }

        footer {
            padding: 120px 0 80px 0;
            text-align: center;
            background: linear-gradient(to bottom, transparent, #000);
            border-top: 1px solid rgba(197, 163, 88, 0.1);
        }

        footer p {
            font-family: 'Noto Serif TC', serif;
            letter-spacing: 0.3em;
            font-size: 1rem;
            color: var(--accent-gold);
        }

        @media (max-width: 992px) {
            .content-section, .content-section:nth-child(even) {
                flex-direction: column;
                padding: 10vh 8%;
            }
            .frame {
                transform: rotate(0deg) !important;
                max-width: 100%;
            }
            .text-box {
                margin-bottom: 40px;
            }
            .letterbox { height: 4vh; }
        }
    </style>
</head>
<body>

    <div class="film-grain"></div>
    <div class="letterbox top-bar"></div>
    <div class="letterbox bottom-bar"></div>

    <section class="hero">
        <div class="reveal">
            <p>A Cinematic Journey</p>
            <h1>深藍史詩</h1>
            <p>與海洋生物的無聲對話</p>
        </div>
    </section>

    <section class="content-section">
        <div class="text-box reveal">
            <h2>遺落的湛藍聖殿</h2>
            <p>大海佔據了地球百分之七十的面積，但在波濤之下，隱藏著一個我們鮮少觸及的異世界。</p>
        </div>
        <div class="image-box reveal delay-1">
            <div class="frame">
                <img src="https://raw.githubusercontent.com/bhes109341-ui/website/main/2.png" alt="Deep Sea">
            </div>
        </div>
    </section>

    <section class="content-section">
        <div class="text-box reveal">
            <h2>深海巨獸的迴聲</h2>
            <p>在深藍的遠方，傳來了座頭鯨與抹香鯨的長鳴。牠們是海洋中的游牧民族，穿越數千海里的遷徙路徑。</p>
        </div>
        <div class="image-box reveal delay-1">
            <div class="frame">
                <img src="https://raw.githubusercontent.com/bhes109341-ui/website/main/3.png" alt="Whale">
            </div>
        </div>
    </section>

    <footer>
        <p class="reveal">洪顥尹 | 海洋生物介紹</p>
        <p style="font-size: 0.6rem; opacity: 0.4; margin-top: 15px;">© 2026 DEEP BLUE CINEMA.</p>
    </footer>

    <script>
        // 1. Intersection Observer
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.15 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // 2. 註冊 Service Worker (PWA 關鍵)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered!', reg))
                    .catch(err => console.log('SW failed!', err));
            });
        }
    </script>
</body>
</html>
